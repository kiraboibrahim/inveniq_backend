name: Linting, Testing and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Linting and Code Quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    name: Testing
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install -e "."

      - name: Copy test environment file
        run: |
          cp .env.test .env

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: github_actions_dummy_secret_key_12345
        run: |
          pytest

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        if: always()
  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Execute Remote Deploy Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,REPO
          script: |
            set -e
            echo "Starting continuous deployment..."

            # Ensure the deployment directory exists
            mkdir -p /home/ubuntu/inveniq_backend
            cd /home/ubuntu/inveniq_backend

            # Initialize the repository if it's missing or corrupted
            if [ ! -d ".git" ]; then
              echo "VCS directory not found. Initializing repository..."
              git init
              git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git || true
            else
              git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git
            fi

            # Fetch and reset
            git fetch origin main
            git reset --hard origin/main

            # Verify mandatory files exist before proceeding
            if [ ! -f "docker-compose.yml" ]; then
              echo "CRITICAL ERROR: docker-compose.yml not found in $(pwd)"
              exit 1
            fi
            # Rebuild and restart services with cleanup to save space
            echo "Pruning old Docker data to clear space..."
            docker system prune -f

            echo "Building and starting containers..."
            docker compose up -d --build

            # Administrative tasks
            echo "Running migrations and collecting static files..."
            docker compose exec -T web python manage.py migrate
            docker compose exec -T web python manage.py collectstatic --noinput
            echo "Restarting background worker..."
            docker compose restart huey

            echo "Deployment Pipeline Complete!"
