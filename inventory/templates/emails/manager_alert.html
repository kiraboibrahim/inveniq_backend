<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvenIQ System Alert</title>
    <style>
        body {
            background-color: #0B1120;
            color: #F1F5F9;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #131C2E;
            border: 1px solid #263351;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .header {
            background-color: #1A2540;
            padding: 24px;
            border-bottom: 1px solid #263351;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #EF4444;
            letter-spacing: -0.05em;
        }
        .content {
            padding: 32px;
        }
        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #F1F5F9;
            margin-top: 0;
            margin-bottom: 16px;
        }
        p {
            font-size: 14px;
            color: #94A3B8;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .alert-box {
            background-color: #EF44441A;
            border: 1px solid #EF4444;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            color: #FCA5A5;
            font-weight: 500;
            font-size: 14px;
        }
        .footer {
            background-color: #1A2540;
            padding: 20px;
            border-top: 1px solid #263351;
            text-align: center;
            font-size: 11px;
            color: #64748B;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="logo">InvenIQ Alert</span>
        </div>
        <div class="content">
            <h1>System Alert Notification</h1>
            <p>An event requiring your attention has been logged in the system.</p>
            
            <div class="alert-box">
                {{ message }}
            </div>

            <p style="margin-bottom: 0;">Please log into the InvenIQ admin dashboard to review and manage this alert.</p>
        </div>
        <div class="footer">
            InvenIQ Inventory Management System - All rights reserved.
        </div>
    </div>
</body>
</html>
